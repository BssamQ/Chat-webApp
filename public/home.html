<!DOCTYPE html>
<html>

<head>
    <title>Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/house-chat.png">
    <link rel="stylesheet" href="/css/styles.min.css">
</head>

<!-- -------------------------------------------------------------- -->
<!-- The skeleton -->

<body>
    <div class="chat">

        <div id="sidebar" class="chat__sidebar">
            <div class="toggle-button">
                <button>☰</button>
                <!-- <ul class="online-indicator">
                    <li><span class="user-status"></span>2/10</li>
                </ul> -->
            </div>


        </div>


        <div class="chat__main">

            <div id="message-form" class="chat__messages"></div>


            <div class="compose">

                <form id="chatForm">
                    <input id="messageFormInput" autocomplete="off" name="sendMessage" placeholder="Write a message...">
                    <button id="messageFormButton">Send</button>
                </form>

                <button class="location-button" id="send-location">Send location</button>
            </div>


        </div>
    </div>
    <!-- -------------------------------------------------------------- -->
    <!-- Sidebar render -->

    <script id="sidebar-template" type="text/html">
        <div class="sidebar__content">
            <h3 class="sidebar__room_title">Room {{room}}</h3>
            <p class="sidebar__usersLabel">Users</p>
            <ul>
                {{#users}}
                <li>
                    <span class="user-status"></span>
                    {{username}}
                </li>
                {{/users}}
            </ul>
        </div>

    </script>

    <!-- ----------------------------------------------------------------- -->
    <!-- message render -->

    <script id="message-template" type="text/html">
        <div class="message">
            <p>
                <span class="message__name">{{username}}</span>
                <span class="message__meta">{{createdAt}}</span>
            </p>
            <p>{{message}}</p>
        </div>
    </script>
    <script id="location-template" type="text/html">
        <div class="message">
            <p>
                <span class="message__name">{{username}}</span>
                <span class="message__meta">{{createdAt}}</span>
            </p>
            <p><a href="{{url}}" target="_blank">My Current location!</a></p>
        </div>
    </script>
    <!-- ----------------------------------------------------------------- -->

    <script>
        const chat = document.querySelector(".chat")
        const button = document.querySelector(".toggle-button")

        button.addEventListener("click", () => {
            chat.classList.toggle("open")
            if (chat.classList.contains("open")) {
                button.textContent = "<="
            } else {
                button.textContent = "☰"
            }
        })
    </script>




    <!-- ----------------------------------------------------------------- -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.0.1/mustache.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.6.0/qs.min.js"></script>
    <script src="/js/chat.js"></script>
    <!-- ----------------------------------------------------------------- -->
</body>

</html>
